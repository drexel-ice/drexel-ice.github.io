name: 📰 Add Content
description: Request to add news, publication, project, or team member
labels: ["content"]
body:
  - type: dropdown
    id: content-type
    attributes:
      label: Content Type
      options:
        - News item
        - Publication
        - Project page
        - Blog post
        - Team member
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Content Details
      description: Provide the content you'd like added
      placeholder: |
        For news: What happened? Date?
        For publication: BibTeX entry or DOI
        For project: Title, description, image
        For team member: Name, role, bio, photo
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional Context
      description: Any images, links, or files to include
    validations:
      required: false
