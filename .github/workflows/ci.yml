name: CI - Pull Request Checks

# NOTE: org Actions policy only permits GitHub-owned actions (actions/*) and
# local composite actions; third-party actions cause startup_failure.
# Tooling is therefore invoked directly (Docker images, pip packages).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  JEKYLL_IMAGE: amirpourmand/al-folio:v0.16.3

jobs:
  # ── Build Validation (REQUIRED) ────────────────────────────────────────
  # This is the only truly critical check: does the site build?
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site (Jekyll in Docker)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e JEKYLL_ENV=production \
            -v "$PWD:/srv/jekyll" \
            "$JEKYLL_IMAGE" \
            bash -c "cd /srv/jekyll && bundle exec jekyll build"
          test -f _site/index.html

      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site/
          retention-days: 3

  # ── Broken Link Check (advisory) ──────────────────────────────────────
  # Reports broken links but does NOT block merge
  links:
    name: Check Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Checker (lychee via Docker, advisory)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/input" -w /input \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            lycheeverse/lychee:latest \
            --user-agent 'curl/7.54' \
            --exclude-path README.md \
            --exclude-path _pages/404.md \
            --exclude-path _pages/blog.md \
            --exclude '%7B%7B' \
            --exclude 'reddit\.com' \
            --exclude 'unsplash\.com' \
            --accept 403,401,429 \
            --timeout 30 \
            --max-retries 3 \
            --no-progress \
            './**/*.md' './**/*.html'

  # ── YAML Validation (REQUIRED) ─────────────────────────────────────────
  # Catches broken front-matter in _config.yml and data files
  yaml:
    name: YAML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML (yamllint)
        run: |
          pip install yamllint
          cat > /tmp/yamllint.yml <<'EOF'
          extends: default
          rules:
            line-length:
              max: 300
              allow-non-breakable-inline-mappings: true
            truthy:
              check-keys: false
            document-start: disable
            comments:
              min-spaces-from-content: 1
          EOF
          yamllint -c /tmp/yamllint.yml _config.yml _data/*.yml

  # ── BibTeX Validation (REQUIRED) ───────────────────────────────────────
  # Catches broken bibliography entries that would break the publications page
  bibtex:
    name: BibTeX Validation
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate BibTeX
        run: |
          pip install bibtexparser
          python3 -c "
          import bibtexparser
          import sys
          try:
              with open('_bibliography/papers.bib', 'r') as f:
                  bib = bibtexparser.load(f)
              print(f'✅ BibTeX valid: {len(bib.entries)} entries found')
              for entry in bib.entries:
                  if 'title' not in entry:
                      print(f'⚠️  Entry {entry.get(\"ID\", \"unknown\")} missing title')
                  if 'year' not in entry:
                      print(f'⚠️  Entry {entry.get(\"ID\", \"unknown\")} missing year')
              sys.exit(0)
          except Exception as e:
              print(f'❌ BibTeX parse error: {e}')
              sys.exit(1)
          "

  # ── Content Agent Preflight (REQUIRED on content tooling changes) ────────
  content-validation:
    name: Content Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install bibtexparser

      - name: Validate intake examples
        run: |
          for f in content-intake/examples/*.json; do
            echo "Validating $f"
            python3 bin/content/intake.py "$f"
          done

      - name: Check PDF paths
        run: python3 bin/check_pdf_paths.py

      - name: Content preflight
        run: python3 bin/content/validate.py --skip-build
