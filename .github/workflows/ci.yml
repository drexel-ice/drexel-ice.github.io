name: CI - Pull Request Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ── Build Validation (REQUIRED) ────────────────────────────────────────
  # This is the only truly critical check: does the site build?
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install Python dependencies
        run: pip3 install --upgrade nbconvert

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site/
          retention-days: 3

  # ── Broken Link Check (advisory) ──────────────────────────────────────
  # Reports broken links but does NOT block merge
  links:
    name: Check Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2.0.2
        with:
          fail: false # Advisory only - don't block PRs
          jobSummary: true
          args: >
            --user-agent 'curl/7.54'
            --exclude-path README.md
            --exclude-path _pages/404.md
            --exclude-path _pages/blog.md
            --exclude-path RESEARCH_REPORT.md
            --exclude-path CUSTOMIZE.md
            --exclude-path FAQ.md
            --exclude-path INSTALL.md
            --exclude-path LAB_WEBSITE_ANALYSIS.md
            --exclude '%7B%7B'
            --exclude 'reddit\.com'
            --exclude 'unsplash\.com'
            --accept 403,401,429
            --timeout 30
            --max-retries 3
            --no-progress
            './**/*.md' './**/*.html'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── YAML Validation (REQUIRED) ─────────────────────────────────────────
  # Catches broken front-matter in _config.yml and data files
  yaml:
    name: YAML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: |
            _config.yml
            _data/*.yml
          config_data: |
            extends: default
            rules:
              line-length:
                max: 300
                allow-non-breakable-inline-mappings: true
              truthy:
                check-keys: false
              document-start: disable
              comments:
                min-spaces-from-content: 1

  # ── BibTeX Validation (REQUIRED) ───────────────────────────────────────
  # Catches broken bibliography entries that would break the publications page
  bibtex:
    name: BibTeX Validation
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate BibTeX
        run: |
          pip install bibtexparser
          python3 -c "
          import bibtexparser
          import sys
          try:
              with open('_bibliography/papers.bib', 'r') as f:
                  bib = bibtexparser.load(f)
              print(f'✅ BibTeX valid: {len(bib.entries)} entries found')
              for entry in bib.entries:
                  if 'title' not in entry:
                      print(f'⚠️  Entry {entry.get(\"ID\", \"unknown\")} missing title')
                  if 'year' not in entry:
                      print(f'⚠️  Entry {entry.get(\"ID\", \"unknown\")} missing year')
              sys.exit(0)
          except Exception as e:
              print(f'❌ BibTeX parse error: {e}')
              sys.exit(1)
          "
