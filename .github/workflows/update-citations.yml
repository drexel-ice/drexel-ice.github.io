name: Update Google Scholar Citations

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC
    - cron: "0 6 * * 4" # Thursday 6am UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-citations
  cancel-in-progress: true

jobs:
  update-citations:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Save current citations hash
        id: before
        run: |
          if [ -f _data/citations.yml ]; then
            sha_before=$(sha256sum _data/citations.yml | awk '{print $1}')
            echo "sha_before=$sha_before" >> $GITHUB_OUTPUT
          else
            echo "sha_before=none" >> $GITHUB_OUTPUT
          fi

      - name: Run citation update
        id: run_update
        shell: bash
        run: |
          set +e
          timeout 90 python bin/update_scholar_citations.py
          status=$?
          if [ $status -eq 0 ]; then
            echo "✅ Citation update succeeded" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Citation update failed (exit code $status)" >> $GITHUB_STEP_SUMMARY
          fi
          set -e

      - name: Save new citations hash
        id: after
        run: |
          if [ -f _data/citations.yml ]; then
            sha_after=$(sha256sum _data/citations.yml | awk '{print $1}')
            echo "sha_after=$sha_after" >> $GITHUB_OUTPUT
          else
            echo "sha_after=none" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.before.outputs.sha_before != steps.after.outputs.sha_after
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add _data/citations.yml
          git diff --staged --quiet || (
            git commit -m "chore: update Google Scholar citations"
            git push
          )
