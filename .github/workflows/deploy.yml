name: Deploy site

# NOTE: The drexel-ice org Actions policy only permits GitHub-owned actions
# (actions/*) and local composite actions. Third-party marketplace actions
# (ruby/setup-ruby, JamesIves/github-pages-deploy-action, lychee-action, ...)
# cause an immediate startup_failure. This workflow therefore builds inside
# the pinned al-folio Docker image and deploys with plain git.

on:
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "_bibliography/**"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_news/**"
      - "_pages/**"
      - "_plugins/**"
      - "_posts/**"
      - "_projects/**"
      - "_sass/**"
      - "_scripts/**"
      - "_team/**"
      - "_config.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - ".github/workflows/**"
      - "!README.md"
      - "!CONTRIBUTING.md"
      - "!LICENSE"
      - "!CONTENT.md"
      - "bin/**"
      - "purgecss.config.js"

  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  JEKYLL_IMAGE: amirpourmand/al-folio:v0.16.3

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site (Jekyll in Docker)
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e JEKYLL_ENV=production \
            -v "$PWD:/srv/jekyll" \
            "$JEKYLL_IMAGE" \
            bash -c "cd /srv/jekyll && bundle exec jekyll build"
          test -f _site/index.html

      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      - name: Deploy to GitHub Pages (git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          touch .nojekyll
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy site from ${GITHUB_SHA} (run ${GITHUB_RUN_ID})"
          git push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages

  post-deploy-check:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'

    steps:
      - name: Wait for GitHub Pages propagation
        run: sleep 45

      - name: Check deployed site for broken links (lychee via Docker)
        continue-on-error: true
        run: |
          docker run --rm lycheeverse/lychee:latest \
            --user-agent 'curl/7.54' \
            --exclude 'ece\.drexel\.edu' \
            --exclude 'research\.coe\.drexel\.edu' \
            --exclude 'scholar\.google\.com' \
            --accept 403,401,429 \
            --timeout 30 \
            --max-retries 3 \
            --no-progress \
            --max-concurrency 4 \
            https://drexel-ice.github.io/ \
            https://drexel-ice.github.io/team/ \
            https://drexel-ice.github.io/projects/ \
            https://drexel-ice.github.io/research/ \
            https://drexel-ice.github.io/publications/ \
            https://drexel-ice.github.io/contact/ \
            https://drexel-ice.github.io/blog/

      - name: Smoke check publications page
        run: |
          python3 - <<'PY'
          import re
          import urllib.request
          url = "https://drexel-ice.github.io/publications/"
          html = urllib.request.urlopen(url, timeout=30).read().decode("utf-8", errors="replace")
          if re.search(r"\b2077\b", html):
              raise SystemExit("Bad year 2077 found on publications page")
          print("Publications smoke check passed.")
          PY
