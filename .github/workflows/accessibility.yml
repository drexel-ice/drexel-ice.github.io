name: Accessibility & Performance Audit

on:
  # Run after successful deploy
  workflow_run:
    workflows: [Deploy site]
    types: [completed]

  # Allow manual trigger with custom URL path
  workflow_dispatch:
    inputs:
      url_path:
        description: "URL path to audit (e.g. blog/ or publications/)"
        required: false
        default: ""

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Build site locally
        env:
          JEKYLL_ENV: production
        run: |
          pip3 install --upgrade nbconvert
          bundle exec jekyll build

      - name: Purge unused CSS
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      # Axe accessibility testing
      - name: Get Chrome version
        run: |
          CHROMIUM_VERSION=$(wget -qO- https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_STABLE | cut -d. -f1)
          echo "CHROMIUM_VERSION=$CHROMIUM_VERSION" >> $GITHUB_ENV

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: ${{ env.CHROMIUM_VERSION }}

      - name: Install testing tools
        run: |
          npm install -g chromedriver@$CHROMIUM_VERSION
          npm install -g @axe-core/cli
          npm install -g http-server

      - name: Run accessibility audit
        run: |
          http-server _site/ -p 8080 &
          sleep 3
          URL_PATH="${{ github.event.inputs.url_path || '' }}"
          axe --chromedriver-path $(npm root -g)/chromedriver/bin/chromedriver \
            "http://localhost:8080/${URL_PATH}" \
            --load-delay=1500 --exit || true

      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
