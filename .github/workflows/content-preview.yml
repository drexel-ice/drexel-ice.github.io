name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install Python dependencies
        run: pip3 install --upgrade nbconvert

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-preview-pr${{ github.event.number }}
          path: _site/
          retention-days: 7

      - name: Comment on PR with preview info
        uses: thollander/actions-comment-pull-request@v2
        with:
          comment_tag: preview-build
          message: |
            :white_check_mark: **Preview build successful!**

            The site built successfully from this PR. Download the preview artifact from the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) to inspect locally.

            **Changes detected in:**
            ```
            ${{ github.event.pull_request.title }}
            ```
